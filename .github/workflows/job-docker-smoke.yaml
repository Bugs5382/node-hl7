name: Docker Smoke
on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches:
      - "**"
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
    # Smoke + Kind only run when source files in the workspaces actually
    # change. Documentation (.md), changelogs, and unrelated repo files
    # are excluded — kind cluster spin-up is expensive.
    paths:
      - "packages/**/*.ts"
      - "packages/**/*.mjs"
      - "packages/**/*.cjs"
      - "packages/**/*.js"
      - "packages/**/package.json"
      - "packages/**/tsconfig.json"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  Smoke:
    name: Build image and send HL7 message to :3000
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate lockfile
        run: npm install --package-lock-only --ignore-scripts --legacy-peer-deps

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Build workspaces
        run: npm run build --workspaces

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          tags: node-hl7-server:smoke
          load: true
          push: false

      - name: Start container
        run: |
          docker run -d --name hl7-smoke -p 3000:3000 node-hl7-server:smoke
          docker ps --filter name=hl7-smoke

      - name: Wait for listener on :3000
        run: |
          timeout 30 bash -c 'until nc -z 127.0.0.1 3000; do sleep 1; done'
          echo "listener accepting connections"

      - name: Send HL7 message and verify ACK
        run: node docker/smoke.mjs

      - name: Container logs (debug)
        if: always()
        run: docker logs hl7-smoke || true

      - name: Stop container
        if: always()
        run: docker rm -f hl7-smoke || true

  Kind-Plain:
    name: Kind cluster — apply server.yaml and send HL7 message
    runs-on: ubuntu-latest
    needs: ['Smoke']
    steps:
      - uses: actions/checkout@v6

      - name: Generate lockfile
        run: npm install --package-lock-only --ignore-scripts --legacy-peer-deps

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Build workspaces
        run: npm run build --workspaces

      - name: Create kind cluster
        uses: helm/kind-action@v1

      - name: Build image
        run: docker build -t docker-node-hl7-server:latest -f docker/Dockerfile .

      - name: Load image into kind
        run: kind load docker-image docker-node-hl7-server:latest

      - name: Apply manifest
        run: kubectl apply -f docker/yaml/server.yaml

      - name: Wait for Deployment
        run: kubectl -n hl7-server wait --for=condition=available deployment/hl7-server --timeout=180s

      - name: Port-forward Service
        run: |
          kubectl -n hl7-server port-forward svc/hl7-server 3000:3000 >/tmp/pf.log 2>&1 &
          echo $! > /tmp/pf.pid
          timeout 30 bash -c 'until nc -z 127.0.0.1 3000; do sleep 1; done'
          echo "port-forward up"

      - name: Send HL7 message and verify ACK
        run: node docker/smoke.mjs

      - name: Diagnostics
        if: failure()
        run: |
          echo "===pods==="
          kubectl -n hl7-server get pods -o wide || true
          echo "===describe==="
          kubectl -n hl7-server describe deployment/hl7-server || true
          echo "===logs==="
          kubectl -n hl7-server logs deployment/hl7-server --tail=200 || true
          echo "===port-forward log==="
          cat /tmp/pf.log || true

      - name: Stop port-forward
        if: always()
        run: kill "$(cat /tmp/pf.pid)" 2>/dev/null || true

  Kind-TLS:
    name: Kind cluster — apply tls.server.yaml with mTLS and send HL7 message
    runs-on: ubuntu-latest
    needs: ['Smoke']
    steps:
      - uses: actions/checkout@v6

      - name: Generate lockfile
        run: npm install --package-lock-only --ignore-scripts --legacy-peer-deps

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Build workspaces
        run: npm run build --workspaces

      - name: Generate mTLS chain (CA + server + client)
        run: |
          mkdir -p /tmp/tls && cd /tmp/tls
          # Self-signed CA.
          openssl req -x509 -newkey rsa:2048 -nodes -days 1 \
            -keyout ca.key -out ca.crt -subj "/CN=node-hl7-test-ca"
          # Server cert signed by that CA, CN=localhost for port-forward target.
          openssl req -newkey rsa:2048 -nodes \
            -keyout tls.key -out tls.csr -subj "/CN=localhost"
          openssl x509 -req -in tls.csr -CA ca.crt -CAkey ca.key -CAcreateserial \
            -out tls.crt -days 1 -extfile <(printf "subjectAltName=DNS:localhost,IP:127.0.0.1")
          # Client cert signed by the same CA.
          openssl req -newkey rsa:2048 -nodes \
            -keyout client.key -out client.csr -subj "/CN=node-hl7-test-client"
          openssl x509 -req -in client.csr -CA ca.crt -CAkey ca.key -CAcreateserial \
            -out client.crt -days 1
          ls -1

      - name: Create kind cluster
        uses: helm/kind-action@v1

      - name: Build image
        run: docker build -t docker-node-hl7-server:latest -f docker/Dockerfile .

      - name: Load image into kind
        run: kind load docker-image docker-node-hl7-server:latest

      - name: Create Namespace and hl7-tls Secret (matches manifest expectations)
        run: |
          kubectl create namespace hl7-server
          kubectl -n hl7-server create secret generic hl7-tls \
            --from-file=tls.key=/tmp/tls/tls.key \
            --from-file=tls.crt=/tmp/tls/tls.crt \
            --from-file=ca.crt=/tmp/tls/ca.crt

      - name: Apply manifest
        run: kubectl apply -f docker/yaml/tls.server.yaml

      - name: Wait for Deployment
        run: kubectl -n hl7-server wait --for=condition=available deployment/tls-hl7-server --timeout=180s

      - name: Port-forward Service
        run: |
          kubectl -n hl7-server port-forward svc/tls-hl7-server 3000:3000 >/tmp/pf.log 2>&1 &
          echo $! > /tmp/pf.pid
          timeout 30 bash -c 'until nc -z 127.0.0.1 3000; do sleep 1; done'
          echo "port-forward up"

      - name: Send HL7 message over mTLS and verify ACK
        env:
          SMOKE_CERTS_DIR: /tmp/tls
        run: node docker/smoke.tls.mjs

      - name: Diagnostics
        if: failure()
        run: |
          echo "===pods==="
          kubectl -n hl7-server get pods -o wide || true
          echo "===describe==="
          kubectl -n hl7-server describe deployment/tls-hl7-server || true
          echo "===logs==="
          kubectl -n hl7-server logs deployment/tls-hl7-server --tail=200 || true
          echo "===port-forward log==="
          cat /tmp/pf.log || true

      - name: Stop port-forward
        if: always()
        run: kill "$(cat /tmp/pf.pid)" 2>/dev/null || true
